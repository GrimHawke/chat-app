services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chat-network

  server:
    image: grimhawke/chat-app-server:latest
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLASK_DEBUG: "1"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-network
    restart: unless-stopped

  frontend:
    image: grimhawke/chat-app-vite:latest
    ports:
      - "5173:5173"
    environment:
      API_SERVER_TARGET: "http://server:5000"
    depends_on:
      - server
    networks:
      - chat-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  chat-network:
    driver: bridge
